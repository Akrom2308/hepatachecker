services:
  - type: web
    name: hepatitcheck-api
    env: node
    plan: free

    buildCommand: npm install
    startCommand: npm start

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false
